<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HE Escalas</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (opcional, para ícones mais profissionais) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            background-color: #343a40;
            position: sticky;
            top: 0;
        }

        .sidebar .nav-link {
            color: #fff;
            padding: 12px 20px;
            transition: background-color 0.2s;
        }

        .sidebar .nav-link:hover {
            background-color: #495057;
        }

        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .card-dashboard {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card-dashboard:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .main-content {
            min-height: 100vh;
        }
    </style>
</head>
<body>

<div class="container-fluid g-0">
    <div class="row g-0">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-0">
            <div class="d-flex flex-column">
                <h4 class="text-white text-center py-3 mb-0 bg-dark">HE Escalas</h4>

                <nav class="nav flex-column mt-2">
                    <a class="nav-link" href="/">
                        <i class="bi bi-house-door"></i> Dashboard
                    </a>
                    <a class="nav-link" href="{{ url_for('main.funcionarios') }}">
                        <i class="bi bi-person"></i> Funcionários
                    </a>
                    <a class="nav-link" href="{{ url_for('periodo.periodos') }}">
                        <i class="bi bi-calendar"></i> Escalas
                    </a>
                    <a class="nav-link" href="#">
                        <i class="bi bi-file-bar-graph"></i> Relatórios
                    </a>
                </nav>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="col-md-10 main-content p-4">

            <!-- NAVBAR SUPERIOR -->
            <nav class="navbar navbar-light bg-white shadow-sm rounded-3 mb-4 px-3">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h5">
                        <i class="bi bi-grid me-2"></i>Painel de Controle
                    </span>
                    
                    <!-- Menu do usuário (opcional) -->
                    <div class="dropdown">
                        <button class="btn btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> Usuário
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#"><i class="bi bi-person"></i> Perfil</a></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-gear"></i> Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#"><i class="bi bi-box-arrow-right"></i> Sair</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <!-- ÁREA DE CONTEÚDO DINÂMICO -->
            {% block content %}{% endblock %}

        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle (necessário para dropdowns, modais, etc) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Espaço para scripts adicionais -->
{% block scripts %}{% endblock %}

</body>
</html>
