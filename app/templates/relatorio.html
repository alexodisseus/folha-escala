<h2>Relatório HE</h2>

<table border="1">
  <tr>
    <th>Funcionário</th>
    <th>Dias HE</th>
    <th>Horas HE</th>
  </tr>

  {% for r in relatorio %}
  <tr>
    <td>{{r.nome}}</td>
    <td>{{r.dias}}</td>
    <td>{{r.horas}}h</td>
  </tr>
  {% endfor %}
</table>

<h3>Total de dias: {{total_dias}}</h3>
<h3>Total de horas: {{total_horas}}h</h3>
